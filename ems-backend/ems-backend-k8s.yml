apiVersion: apps/v1
kind: Deployment
metadata:
  name: ems-backend-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ems-backend
  template:
    metadata:
      labels:
        app: ems-backend
    spec:
      containers:
        - name: ems-backend-container
          image: balajitj/backendapp:latest # Your actual Docker Hub image
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: ems-backend-svc
spec:
  type: LoadBalancer
  selector:
    app: ems-backend
  ports:
    - port: 8080
      targetPort: 8080
